# ==========================================================
# 测试环境配置 (I-11 Agent 集成测试用)
#
# 目的: 让 @SpringBootTest 启动不依赖真实 GLM_API_KEY
# - 用 H2 内存数据库 (MySQL 兼容 mode)
# - 用真 GLM key (GLM_API_KEY env var) 让 AgentIntegrationTest 真跑
# - 禁 Flyway (user 是 H2 关键字 + 没 v2-schema 需要的 MySQL 特性)
# - GLMChatModel 是自定义 ChatModel, 不依赖 spring-ai-openai starter
# ==========================================================

spring:
  ai:
    openai:
      api-key: test-mock-key-not-used
      base-url: http://localhost:0
      chat:
        options:
          model: glm-4-flash
    agent:
      enabled: true
  flyway:
    enabled: false  # H2 测例禁 Flyway (user 是 H2 关键字)
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: true  # 全加引号, 避免 user 冲突
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

# 让项目自家的 GlmService 拿到真 key (P0-19 修: 之前测例 MockBean GlmService, 现在真调)
app:
  glm:
    api-key: ${GLM_API_KEY:test-mock-key}
    chat-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    chat-model: glm-4-flash-250414
    timeout-seconds: 60