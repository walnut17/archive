spring:
  application:
    name: archive
  main:
    banner-mode: console
  # 占位符从 config.json 注入(由 ConfigJsonLoader 加载,见 META-INF/spring.factories)
  # 如果 config.json 不存在,用这里的默认值(开发环境)
  datasource:
    url: jdbc:mysql://${app.database.host:localhost}:${app.database.port:3306}/${app.database.database:archive_db}?${app.database.params:useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${app.database.username:archive_app}
    password: ${app.database.password:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${app.database.pool-max-size:10}
      minimum-idle: ${app.database.pool-min-idle:2}
      pool-name: archive-hikari
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update          # 允许 Hibernate 自动加缺失字段 (entity 改了表不用手动改 schema)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mail:
    host: ${app.mail.host:smtp.internal.example.cn}
    port: ${app.mail.port:25}
    username: ${app.mail.username:archive@example.com}
    password: ${app.mail.password:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: ${app.mail.use-tls:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Spring AI — 智能问答 Agent(Plan I)
  # 注: 不配 spring.ai.openai.*, 因为智谱用 v4 (非标准 v1)
  # 改用自定义 GLMChatModel (调项目自家 GlmService -> 智谱 v4 endpoint)
  ai:
    # 显式关闭 Spring AI 内置模型 (用 GLMChatModel 自定义)
    # 不关会强制要 spring.ai.openai.api-key (OpenAI key) — matchIfMissing=true
    model:
      audio:
        speech: none   # 关闭 OpenAI audio speech
        transcription: none  # 关闭 OpenAI audio transcription
      image: none      # 关闭 OpenAI image (DALL-E)
      embedding: none  # 关闭 OpenAI embedding
      moderation: none  # 关闭 OpenAI moderation
      chat: none       # 关闭 OpenAI chat (GLMChatModel 自定义)
    agent:
      enabled: ${AGENT_ENABLED:true}
      observation-truncate-chars: 2000
      # 5 步上限硬编码在 AgentEngine.MAX_ITERATIONS = 5
      # find_project 工具: 4 级兜底链配置
      find-project:
        # 4 级: code 精确 -> FULLTEXT -> LIKE -> LLM 语义匹配
        # LLM 兜底只在项目总数 < 此值时调用 (避免 token 爆炸, 100 万字库项目不会炸)
        llm-fallback-max-total: ${FIND_PROJECT_LLM_FALLBACK_MAX_TOTAL:300}
        # 死循环保护: 连续同 (tool, args) 几次 = 死循环
        # 1 = 第 1 次死循环就注入 hint
        # 2 = 第 2 次死循环强制 FINAL_ANSWER
        # 配 1 较严, 配 2 较宽, 默认 1
        loop-trigger-threshold: ${AGENT_LOOP_THRESHOLD:1}

server:
  port: ${app.server.port:8080}
  servlet:
    context-path: ${app.server.context-path:/}
  compression:
    enabled: true
  tomcat:
    uri-encoding: UTF-8

# 应用专属配置(从 config.json 注入,见 ConfigJsonLoader)
app:
  glm:
    api-key:
    chat-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    vision-url: https://open.bigmodel.cn/api/paas/v4/vision
    chat-model: glm-4-flash
    vision-model: glm-4v
    timeout-seconds: 60
  storage:
    file-root: D:/archive/files
    parsed-root: D:/archive/parsed
    log-root: D:/archive/logs
    upload-max-size-mb: 100
  jwt:
    # 实际从 config.json 读,这里给开发期默认
    secret: change-me-please-this-is-a-default-secret-key-32bytes-long
    expiration-seconds: 28800

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,httptrace,loggers,threaddump,heapdump
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.archive: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: D:/archive/logs/backend.log
    max-size: 100MB
    max-history: 30
